<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Check-in Coach</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Reset & base ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E3A5F;--blue:#2563EB;--blue-l:#EFF6FF;--blue-ll:#DBEAFE;
  --green:#166534;--green-l:#F0FDF4;--green-m:#16A34A;--green-ll:#DCFCE7;
  --orange:#EA580C;--orange-l:#FFF7ED;
  --red:#991B1B;--red-l:#FEE2E2;
  --amber:#854D0E;--amber-l:#FEF9C3;
  --purple:#6B21A8;--purple-l:#F3E8FF;
  --gray-d:#334155;--gray-m:#64748B;--gray-l:#F1F5F9;
  --bg:#F8FAFC;--card:#fff;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}

/* ── Layout ── */
.wrap{max-width:520px;margin:0 auto;padding:.75rem .75rem 3rem}

/* ── Header ── */
.hdr{background:var(--navy);border-radius:var(--radius-lg);padding:1.25rem 1.4rem;margin-bottom:.75rem}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}
.hdr-name{color:#fff;font-size:20px;font-weight:600;line-height:1.2}
.hdr-sub{color:#93C5FD;font-size:12px;line-height:1.4}
.hdr-badge{background:rgba(255,255,255,.18);color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.04em;white-space:nowrap;margin-top:2px}

/* ── Nav ── */
.nav{display:flex;gap:6px;margin-bottom:.75rem}
.nav-btn{flex:1;padding:10px 6px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);font-weight:400;transition:all .12s}
.nav-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
.nav-btn:hover:not(.active){background:var(--gray-l)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.15rem;margin-bottom:.65rem;box-shadow:var(--shadow)}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.7rem;display:flex;align-items:center;gap:7px}
.sec-ico{width:18px;height:18px;border-radius:5px;background:var(--blue-ll);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

/* ── Sliders ── */
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:.55rem}
.sl-lbl{font-size:13px;color:var(--gray-d);min-width:88px;line-height:1.3}
.sl-row input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none}
.sl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.sl-val{font-size:13px;font-weight:600;color:var(--text);min-width:38px;text-align:right}
.sl-hint{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:-2px;margin-bottom:.55rem;padding:0 0 0 98px}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.5rem}
.chip{padding:6px 13px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .12s;user-select:none}
.chip:hover{border-color:var(--blue);color:var(--navy)}
.chip.sel  {border-color:var(--blue);  background:var(--blue-l); color:var(--navy);font-weight:600}
.chip.sel-g{border-color:var(--green-m);background:var(--green-l);color:var(--green);font-weight:600}
.chip.sel-r{border-color:#E24B4A;background:var(--red-l);  color:var(--red);font-weight:600}
.chip.sel-a{border-color:#EF9F27;background:var(--amber-l);color:var(--amber);font-weight:600}

/* ── Stars ── */
.stars{display:flex;gap:10px}
.star{font-size:26px;cursor:pointer;color:var(--border);line-height:1;transition:color .1s;user-select:none}
.star.on{color:#F59E0B}

/* ── Textarea & inputs ── */
textarea,input[type=text],input[type=password],input[type=email]{
  width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;font-size:13px;color:var(--text);background:var(--card);
  font-family:inherit;line-height:1.5;outline:none;transition:border-color .15s}
textarea{resize:none}
textarea:focus,input:focus{border-color:var(--blue)}

/* ── Buttons ── */
.btn{width:100%;padding:13px;border:none;border-radius:var(--radius-md);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--blue)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:#94A3B8;cursor:not-allowed}
.btn-green{background:var(--green-m);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;border:1.5px solid var(--blue);background:var(--blue-l);color:var(--navy)}
.btn-sm:hover{background:var(--blue-ll)}

/* ── Success ── */
.success{background:var(--green-l);border:1px solid #86EFAC;border-radius:var(--radius-md);padding:2rem 1.5rem;text-align:center;margin-bottom:.75rem}
.success .ico{font-size:40px;margin-bottom:.75rem}
.success h2{color:#14532D;font-size:18px;font-weight:600;margin-bottom:.35rem}
.success p{color:var(--green);font-size:14px}

/* ── PIN ── */
.pin-wrap{max-width:320px;margin:1rem auto;text-align:center}
.pin-input{font-size:24px;letter-spacing:.7em;text-align:center;padding:12px}

/* ── Coach entries ── */
.entry-card{padding:.9rem 1rem;border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:.6rem;background:var(--card);box-shadow:var(--shadow)}
.entry-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-ll);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--navy);flex-shrink:0}
.ename{font-size:14px;font-weight:600;color:var(--text)}
.edate{font-size:11px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:.65rem}
.metric{text-align:center;background:var(--gray-l);border-radius:6px;padding:6px 2px}
.metric .v{font-size:15px;font-weight:700;color:var(--text);line-height:1}
.metric .l{font-size:9px;color:var(--muted);margin-top:2px}
.brow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.5rem}
.bdg{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
.bdg-g{background:var(--green-ll);color:var(--green)}
.bdg-b{background:var(--blue-ll);color:var(--navy)}
.bdg-a{background:var(--amber-l);color:var(--amber)}
.bdg-r{background:var(--red-l);color:var(--red)}
.alert-tag{background:#FEE2E2;border:1px solid #FCA5A5;color:var(--red);font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.coach-note-box{font-size:12px;color:var(--muted);background:var(--gray-l);padding:8px 10px;border-radius:6px;font-style:italic;border-left:3px solid var(--blue)}

/* ── Stats grid ── */
.stat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem}
.stat-c{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9rem;text-align:center;box-shadow:var(--shadow)}
.stat-c .v{font-size:22px;font-weight:700;color:var(--text)}
.stat-c .l{font-size:10px;color:var(--muted);margin-top:3px}

/* ── Filters ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.fchip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--card);color:var(--muted);font-weight:500}
.fchip.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── Athlete list ── */
.athl-item{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.4rem;background:var(--card)}
.athl-info{display:flex;align-items:center;gap:10px}
.athl-meta{font-size:10px;color:var(--muted);margin-top:1px}
.link-box{background:var(--gray-l);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--muted);font-family:monospace;word-break:break-all;margin-top:.4rem;border:1px solid var(--border)}
.del-btn{padding:5px 9px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;margin-left:6px}
.del-btn:hover{background:var(--red-l);color:var(--red);border-color:#FCA5A5}

/* ── Loader ── */
.loader{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
.loader::after{content:"";display:block;width:24px;height:24px;margin:12px auto 0;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:14px}
.sub-tabs{display:flex;gap:6px;margin-bottom:.75rem}
.sub-tab{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-size:11px;cursor:pointer;color:var(--muted);font-weight:500}
.sub-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
</style>
</head>
<body>
<div class="wrap" id="app">

  <div class="hdr">
    <div class="hdr-top">
      <span class="hdr-name" id="hdr-name">Check-in journalier</span>
      <span class="hdr-badge">PREMIUM</span>
    </div>
    <div class="hdr-sub" id="hdr-sub">Ton coach suit ta progression en temps réel</div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="btn-a" onclick="showView('athlete')">Élève</button>
    <button class="nav-btn" id="btn-c" onclick="showView('coach-login')">Coach</button>
  </div>

  <div id="v-athlete"></div>
  <div id="v-coach-login" style="display:none"></div>
  <div id="v-coach" style="display:none"></div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
// ⚙️  CONFIGURATION — Remplacer par vos vraies valeurs Supabase
// ════════════════════════════════════════════════════════════════
const SUPABASE_URL  = "https://aeagvllbavegwtzfohmg.supabase.co";          // ex: https://xxxx.supabase.co
const SUPABASE_ANON = "sb_publishable_CQuSUJwArWUPO0ncg3gTnA_nvPa0tRP";     // clé anon publique
const COACH_PIN     = "1234";                         // Changer ce code PIN !
const APP_URL       = window.location.origin + window.location.pathname;
// ════════════════════════════════════════════════════════════════

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── URL param ──
function getParam(k){
  const m = location.search.match(new RegExp('[?&]'+k+'=([^&]*)'));
  return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : "";
}
const athleteFromUrl = getParam("athlete")||getParam("name")||"";

// ── View manager ──
let currentView = "athlete";
let coachSubTab  = "dashboard";
let filterName   = "tous";
let repasSelected = [];
let starRating    = 3;

function showView(v){
  currentView = v;
  document.getElementById("v-athlete").style.display     = v==="athlete"     ? "" : "none";
  document.getElementById("v-coach-login").style.display = v==="coach-login" ? "" : "none";
  document.getElementById("v-coach").style.display       = v==="coach"       ? "" : "none";
  document.getElementById("btn-a").className = "nav-btn"+(v==="athlete"?" active":"");
  document.getElementById("btn-c").className = "nav-btn"+(v.startsWith("coach")?" active":"");
  if(v==="coach") loadAndRenderCoach();
}

// ════════════════════════════════════════════════════════════════
// ATHLETE — FORM
// ════════════════════════════════════════════════════════════════
function renderAthlete(success=false){
  const el = document.getElementById("v-athlete");
  const name = athleteFromUrl;

  if(name){
    document.getElementById("hdr-name").textContent = "Bonjour " + name + " 👋";
    document.getElementById("hdr-sub").textContent  = "Ton check-in du jour — 2 minutes top chrono";
  }

  if(!name){
    el.innerHTML = `
      <div class="card" style="text-align:center;padding:2rem 1rem">
        <div style="font-size:36px;margin-bottom:1rem">🔗</div>
        <p style="font-size:14px;color:var(--muted);line-height:1.7">
          Ce formulaire est accessible via un <strong>lien personnalisé</strong>.<br>
          Contacte ton coach pour recevoir ton lien dédié.
        </p>
      </div>`;
    return;
  }

  if(success){
    el.innerHTML = `
      <div class="success">
        <div class="ico">✅</div>
        <h2>Check-in envoyé, ${name} !</h2>
        <p>Ton coach a tout reçu. Continue comme ça, tu es sur la bonne voie !</p>
      </div>
      <button class="btn btn-green" onclick="renderAthlete()">Faire un nouveau check-in</button>`;
    return;
  }

  repasSelected = [];
  starRating = 3;

  el.innerHTML = `

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">🌙</div>Nuit & récupération</div>

      <div class="sl-row">
        <span class="sl-lbl">Durée de nuit</span>
        <input type="range" min="3" max="12" value="7" step=".5"
          oninput="document.getElementById('vs').textContent=parseFloat(this.value).toFixed(1)+'h'"/>
        <span class="sl-val" id="vs">7.0h</span>
      </div>

      <div class="sl-row">
        <span class="sl-lbl">Qualité du sommeil</span>
        <input type="range" min="1" max="10" step="1" value="7"
          oninput="document.getElementById('vsq').textContent=this.value+'/10'"/>
        <span class="sl-val" id="vsq">7/10</span>
      </div>
      <div class="sl-hint"><span>Très mauvaise</span><span>Excellente</span></div>

      <div class="sl-row">
        <span class="sl-lbl">Récupération musculaire</span>
        <input type="range" min="1" max="10" step="1" value="7"
          oninput="document.getElementById('vrc').textContent=this.value+'/10'"/>
        <span class="sl-val" id="vrc">7/10</span>
      </div>
      <div class="sl-hint"><span>Courbatures ++</span><span>Frais &amp; dispo</span></div>
    </div>

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">⚡</div>Énergie &amp; état mental</div>

      <div class="sl-row">
        <span class="sl-lbl">Niveau d'énergie</span>
        <input type="range" min="1" max="10" step="1" value="7"
          oninput="document.getElementById('ve').textContent=this.value+'/10'"/>
        <span class="sl-val" id="ve">7/10</span>
      </div>
      <div class="sl-hint"><span>Épuisé</span><span>Plein d'énergie</span></div>

      <div class="sl-row">
        <span class="sl-lbl">Motivation sport</span>
        <input type="range" min="1" max="10" step="1" value="7"
          oninput="document.getElementById('vm').textContent=this.value+'/10'"/>
        <span class="sl-val" id="vm">7/10</span>
      </div>
      <div class="sl-hint"><span>Aucune envie</span><span>Ultra motivé</span></div>

      <div class="sl-row">
        <span class="sl-lbl">Niveau de stress</span>
        <input type="range" min="1" max="10" step="1" value="4"
          oninput="document.getElementById('vst').textContent=this.value+'/10'"/>
        <span class="sl-val" id="vst">4/10</span>
      </div>
      <div class="sl-hint"><span>Très stressé</span><span>Parfaitement zen</span></div>

      <div class="sl-row">
        <span class="sl-lbl">Humeur générale</span>
        <input type="range" min="1" max="10" step="1" value="7"
          oninput="document.getElementById('vh').textContent=this.value+'/10'"/>
        <span class="sl-val" id="vh">7/10</span>
      </div>
      <div class="sl-hint"><span>Moral bas</span><span>Super forme</span></div>
    </div>

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">💧</div>Hydratation du jour</div>
      <div class="chips" id="hydra">
        ${["< 1L","1 – 1,5L","1,5 – 2L","2 – 2,5L","2,5L et +"].map((o,i)=>
          `<span class="chip${i===2?" sel":""}" onclick="chipSel(this,'hydra')">${o}</span>`).join("")}
      </div>
    </div>

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">🥗</div>Alimentation</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:.5rem">Qualité globale de l'alimentation aujourd'hui</p>
      <div class="chips" id="nutri">
        ${[["Très bonne","sel-g"],["Bonne","sel-g"],["Moyenne","sel-a"],["Faible","sel-r"],["Mauvaise","sel-r"]].map(([o,cls],i)=>
          `<span class="chip${i===1?" "+cls:""}" onclick="chipSel(this,'nutri')">${o}</span>`).join("")}
      </div>
      <p style="font-size:12px;color:var(--muted);margin:.7rem 0 .4rem">Repas pris aujourd'hui <span style="font-size:10px">(plusieurs choix possibles)</span></p>
      <div class="chips" id="repas">
        ${["Petit déjeuner","Déjeuner","Dîner","Collation"].map(o=>
          `<span class="chip" onclick="toggleRepas(this,'${o}')">${o}</span>`).join("")}
      </div>
      <p style="font-size:12px;color:var(--muted);margin:.7rem 0 .4rem">Avez-vous respecté vos objectifs nutritionnels ?</p>
      <div class="chips" id="nutri-objectif">
        ${["Oui, totalement","En grande partie","Partiellement","Non, pas du tout"].map((o,i)=>
          `<span class="chip${i===1?" sel-g":""}" onclick="chipSel(this,'nutri-objectif')">${o}</span>`).join("")}
      </div>
    </div>

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">🏋️</div>Activité physique</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:.5rem">Type d'activité aujourd'hui</p>
      <div class="chips" id="sport">
        ${[["Séance complète","sel-g"],["Séance courte","sel-g"],["Cardio seul","sel"],
           ["Marche / légère","sel"],["Repos actif","sel-a"],["Repos total","sel-a"],["Blessure / arrêt","sel-r"]].map(([o,cls],i)=>
          `<span class="chip${i===0?" "+cls:""}" onclick="chipSel(this,'sport')">${o}</span>`).join("")}
      </div>
      <p style="font-size:12px;color:var(--muted);margin:.7rem 0 .4rem">Qualité de la séance</p>
      <div class="stars" id="stars">
        ${[1,2,3,4,5].map(n=>`<span class="star${n<=3?" on":""}" onclick="setStar(${n})" id="star${n}">★</span>`).join("")}
      </div>
      <p style="font-size:10px;color:var(--muted);margin-top:.3rem">
        1 = très décevant &nbsp;·&nbsp; 3 = correcte &nbsp;·&nbsp; 5 = excellente
      </p>
    </div>

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">🩺</div>Corps &amp; douleurs</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:.5rem">Douleurs ou gênes ressenties aujourd'hui</p>
      <div class="chips" id="pain">
        ${[["Aucune","sel-g"],["Légères courbatures","sel-g"],["Courbatures marquées","sel-a"],
           ["Gêne musculaire","sel-a"],["Douleur articulaire","sel-r"],["Blessure franche","sel-r"]].map(([o,cls],i)=>
          `<span class="chip${i===0?" "+cls:""}" onclick="chipSel(this,'pain')">${o}</span>`).join("")}
      </div>
      <p style="font-size:12px;color:var(--muted);margin:.7rem 0 .4rem">Zone(s) concernée(s) <span style="font-size:10px">(si applicable)</span></p>
      <div class="chips" id="pain-zone">
        ${["Aucune","Épaules","Coudes / poignets","Dos / lombaires","Hanches","Genoux","Chevilles","Autre"].map((o,i)=>
          `<span class="chip${i===0?" sel":""}" onclick="toggleZone(this,'${o}')">${o}</span>`).join("")}
      </div>
      <div class="sl-row" style="margin-top:.75rem">
        <span class="sl-lbl">Fatigue générale</span>
        <input type="range" min="1" max="10" step="1" value="5"
          oninput="document.getElementById('vf').textContent=this.value+'/10'"/>
        <span class="sl-val" id="vf">5/10</span>
      </div>
      <div class="sl-hint"><span>Complètement à plat</span><span>Plein de forme</span></div>
    </div>

    <div class="card">
      <div class="sec-lbl"><div class="sec-ico">💬</div>Message pour ton coach</div>
      <textarea id="notes" rows="4"
        placeholder="Comment tu te sens vraiment ? Une question sur ta séance, ton alimentation, une douleur à signaler, une victoire à célébrer… Ton coach lit tout."></textarea>
    </div>

    <button class="btn btn-primary" id="sbtn" onclick="submitCheckin('${name}')">
      Envoyer mon check-in ✓
    </button>
    <p style="text-align:center;font-size:11px;color:var(--muted);margin-top:.75rem">
      Tes données sont confidentielles et accessibles uniquement à ton coach.
    </p>
    <div style="height:1rem"></div>
  `;
}

let painZones = [];
function toggleZone(el, val){
  if(val==="Aucune"){
    painZones=[];
    document.querySelectorAll("#pain-zone .chip").forEach(c=>c.className="chip");
    el.classList.add("sel");
    return;
  }
  document.querySelector("#pain-zone .chip")?.classList.remove("sel"); // remove Aucune
  if(painZones.includes(val)){
    painZones=painZones.filter(z=>z!==val);
    el.className="chip";
  } else {
    painZones.push(val);
    el.classList.add("sel-r");
  }
}

function chipSel(el, grp){
  document.querySelectorAll("#"+grp+" .chip").forEach(c=>c.className="chip");
  const v = el.textContent.trim();
  const greenSet = new Set(["Très bonne","Bonne","Séance complète","Séance courte","Aucune","Oui, totalement","En grande partie","Légères courbatures"]);
  const redSet   = new Set(["Mauvaise","Blessure / arrêt","Douleur articulaire","Blessure franche","Non, pas du tout"]);
  const amberSet = new Set(["Moyenne","Courbatures marquées","Repos actif","Repos total","Partiellement","Gêne musculaire"]);
  el.className = "chip "+(greenSet.has(v)?"sel-g":redSet.has(v)?"sel-r":amberSet.has(v)?"sel-a":"sel");
}

function toggleRepas(el, val){
  if(repasSelected.includes(val)){
    repasSelected=repasSelected.filter(x=>x!==val);
    el.className="chip";
  } else {
    repasSelected.push(val);
    el.classList.add("sel-g");
  }
}

function setStar(n){
  starRating=n;
  for(let i=1;i<=5;i++) document.getElementById("star"+i).className="star"+(i<=n?" on":"");
}

function getChip(grp){
  return document.querySelector("#"+grp+" .chip.sel, #"+grp+" .chip.sel-g, #"+grp+" .chip.sel-r, #"+grp+" .chip.sel-a")?.textContent.trim()||"";
}
function getSlider(id){ return parseFloat(document.getElementById(id)?.textContent)||0; }

async function submitCheckin(name){
  const btn=document.getElementById("sbtn");
  btn.disabled=true; btn.textContent="Envoi en cours…";

  const payload = {
    athlete_name:        name,
    sleep_duration:      getSlider("vs"),
    sleep_quality:       parseInt(document.getElementById("vsq")?.textContent)||7,
    recovery:            parseInt(document.getElementById("vrc")?.textContent)||7,
    energy:              parseInt(document.getElementById("ve")?.textContent)||7,
    motivation:          parseInt(document.getElementById("vm")?.textContent)||7,
    stress:              parseInt(document.getElementById("vst")?.textContent)||4,
    mood:                parseInt(document.getElementById("vh")?.textContent)||7,
    hydration:           getChip("hydra"),
    nutrition_quality:   getChip("nutri"),
    nutrition_objective: getChip("nutri-objectif"),
    meals:               repasSelected.join(", "),
    sport_type:          getChip("sport"),
    sport_quality:       starRating,
    pain:                getChip("pain"),
    pain_zones:          painZones.join(", ")||"Aucune",
    fatigue:             parseInt(document.getElementById("vf")?.textContent)||5,
    notes:               document.getElementById("notes")?.value.trim()||"",
  };

  const {error} = await db.from("checkins").insert([payload]);
  if(error){
    btn.disabled=false; btn.textContent="Envoyer mon check-in ✓";
    alert("Erreur d'envoi : "+error.message+"\n\nVérifie la configuration Supabase.");
    return;
  }
  renderAthlete(true);
}

// ════════════════════════════════════════════════════════════════
function renderCoachLogin(){
  document.getElementById("v-coach-login").innerHTML = `
    <div class="pin-wrap">
      <div class="card" style="text-align:center;padding:1.5rem">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem">Accès coach</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Code PIN à 4 chiffres</p>
        <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pin"

function checkPin(v){
  if(v.length===4){
    if(v===COACH_PIN){ showView("coach"); }
    else{
      const i=document.getElementById("pin");
      i.style.borderColor="#E24B4A"; i.value="";
      setTimeout(()=>i.style.borderColor="",900);
    }
  }
}

// ════════════════════════════════════════════════════════════════
// COACH — DASHBOARD
// ════════════════════════════════════════════════════════════════
let allEntries = [];
let allAthletes = [];

async function loadAndRenderCoach(){
  renderCoachLoading();
  const {data:entries, error:e1} = await db.from("checkins")
    .select("*").order("created_at",{ascending:false}).limit(300);
  const {data:athletes, error:e2} = await db.from("athletes")
    .select("*").order("name");

  if(e1||e2){
    document.getElementById("v-coach").innerHTML =
      `<div class="card" style="text-align:center;color:var(--red);padding:1.5rem">
        ⚠️ Erreur de connexion Supabase.<br>
        <span style="font-size:12px;color:var(--muted)">${(e1||e2).message}</span>
      </div>`;
    return;
  }
  allEntries  = entries||[];
  allAthletes = athletes||[];
  renderCoachDashboard();
}

function renderCoachLoading(){
  document.getElementById("v-coach").innerHTML = `<div class="loader">Chargement des données…</div>`;
}

function renderCoachDashboard(){
  const el = document.getElementById("v-coach");
  const tabs = [
    {id:"dashboard", lbl:"Dashboard"},
    {id:"athletes",  lbl:"Élèves & liens"},
    {id:"details",   lbl:"Entrées complètes"},
  ];

  const filtered = filterName==="tous" ? allEntries : allEntries.filter(e=>e.athlete_name===filterName);
  const names    = [...new Set(allEntries.map(e=>e.athlete_name))].sort();

  el.innerHTML = `
    <div class="sub-tabs">
      ${tabs.map(t=>`<button class="sub-tab${coachSubTab===t.id?" active":""}"
        onclick="coachSubTab='${t.id}';renderCoachDashboard()">${t.lbl}</button>`).join("")}
    </div>
    ${coachSubTab==="dashboard" ? buildDashboard(filtered, names) : ""}
    ${coachSubTab==="athletes"  ? buildAthletes(names) : ""}
    ${coachSubTab==="details"   ? buildDetails(filtered, names) : ""}
    <div style="height:1rem"></div>
  `;
}

function buildDashboard(filtered, names){
  const avg = (key) => filtered.length
    ? (filtered.reduce((s,e)=>s+(e[key]||0),0)/filtered.length).toFixed(1)*1
    : "–";

  const avgE = avg("energy");
  const avgS = avg("sleep_duration");
  const avgM = avg("motivation");
  const trained = filtered.filter(e=>e.sport_type&&(e.sport_type.includes("complète")||e.sport_type.includes("courte")||e.sport_type.includes("Cardio"))).length;
  const alerts  = filtered.filter(e=>
    e.energy<=3||e.stress>=8||e.mood<=3||
    (e.pain&&(e.pain.includes("Blessure")||e.pain.includes("articulaire")))
  ).length;

  const filterHtml = `
    <div class="filter-row">
      <span class="fchip${filterName==="tous"?" active":""}" onclick="filterName='tous';renderCoachDashboard()">
        Tous (${allEntries.length})
      </span>
      ${names.map(n=>{
        const cnt=allEntries.filter(e=>e.athlete_name===n).length;
        return `<span class="fchip${filterName===n?" active":""}" onclick="filterName='${n}';renderCoachDashboard()">
          ${n} (${cnt})
        </span>`;
      }).join("")}
    </div>`;

  const statsHtml = `
    <div class="stat-g">
      <div class="stat-c"><div class="v">${typeof avgE==="number"?avgE.toFixed(1):avgE}<span style="font-size:11px">/10</span></div><div class="l">Énergie moy.</div></div>
      <div class="stat-c"><div class="v">${typeof avgS==="number"?avgS.toFixed(1):avgS}<span style="font-size:11px">h</span></div><div class="l">Sommeil moy.</div></div>
      <div class="stat-c"><div class="v">${typeof avgM==="number"?avgM.toFixed(1):avgM}<span style="font-size:11px">/10</span></div><div class="l">Motivation moy.</div></div>
      <div class="stat-c"><div class="v">${trained}</div><div class="l">Séances réalisées</div></div>
      <div class="stat-c"><div class="v" style="color:${alerts>0?"var(--red)":"var(--green-m)"}">${alerts}</div><div class="l">🚨 Alertes</div></div>
      <div class="stat-c"><div class="v">${filtered.length}</div><div class="l">Check-ins</div></div>
    </div>`;

  const recent = filtered.slice(0,8).map(entryCard).join("");

  return filterHtml + statsHtml + (recent||`<div class="empty">Aucun check-in pour l'instant.</div>`);
}

function entryCard(e){
  const d   = new Date(e.created_at);
  const ds  = d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"})
              +" · "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const ini = e.athlete_name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  const alert = e.energy<=3||e.stress>=8||e.mood<=3||(e.pain&&e.pain.includes("Blessure"));

  const bdg = (v,hi=7,lo=4) => v>=hi?"bdg-g":v>=lo?"bdg-b":"bdg-r";

  return `<div class="entry-card">
    <div class="entry-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar">${ini}</div>
        <div>
          <div class="ename">${e.athlete_name}</div>
          ${alert?`<span class="alert-tag">⚠️ Alerte</span>`:""}
        </div>
      </div>
      <span class="edate">${ds}</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="v">${e.energy||"–"}<span style="font-size:9px">/10</span></div><div class="l">Énergie</div></div>
      <div class="metric"><div class="v">${e.sleep_duration||"–"}<span style="font-size:9px">h</span></div><div class="l">Sommeil</div></div>
      <div class="metric"><div class="v">${e.motivation||"–"}<span style="font-size:9px">/10</span></div><div class="l">Motiv.</div></div>
      <div class="metric"><div class="v">${e.stress||"–"}<span style="font-size:9px">/10</span></div><div class="l">Stress</div></div>
      <div class="metric"><div class="v">${e.recovery||"–"}<span style="font-size:9px">/10</span></div><div class="l">Récup.</div></div>
    </div>
    <div class="brow">
      <span class="bdg ${bdg(e.energy)}" >Énergie ${e.energy||"–"}/10</span>
      <span class="bdg ${bdg(e.sleep_quality)}">Sommeil ${e.sleep_quality||"–"}/10</span>
      <span class="bdg ${bdg(e.motivation)}">Motiv. ${e.motivation||"–"}/10</span>
      ${e.pain?`<span class="bdg ${e.pain.includes("Blessure")||e.pain.includes("articulaire")?"bdg-r":e.pain==="Aucune"?"bdg-g":"bdg-a"}">${e.pain}</span>`:""}
      ${e.sport_type?`<span class="bdg bdg-b">${e.sport_type}${e.sport_quality?" · ${"★".repeat(e.sport_quality)}":""}</span>`:""}
      ${e.nutrition_quality?`<span class="bdg bdg-b">Nutri : ${e.nutrition_quality}</span>`:""}
      ${e.hydration?`<span class="bdg bdg-b">💧 ${e.hydration}</span>`:""}
    </div>
    ${e.notes?`<div class="coach-note-box">"${e.notes}"</div>`:""}
  </div>`;
}

function buildDetails(filtered, names){
  const filterHtml = `
    <div class="filter-row">
      <span class="fchip${filterName==="tous"?" active":""}" onclick="filterName='tous';renderCoachDashboard()">Tous</span>
      ${names.map(n=>`<span class="fchip${filterName===n?" active":""}" onclick="filterName='${n}';renderCoachDashboard()">${n}</span>`).join("")}
    </div>`;

  const cards = filtered.map(e=>{
    const d  = new Date(e.created_at);
    const ds = d.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"})
               +" · "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    const ini = e.athlete_name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    return `<div class="entry-card">
      <div class="entry-hdr">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="avatar">${ini}</div>
          <span class="ename">${e.athlete_name}</span>
        </div>
        <span class="edate">${ds}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px;color:var(--muted);margin-bottom:.6rem">
        <span>💤 ${e.sleep_duration}h · qualité ${e.sleep_quality}/10</span>
        <span>💪 Récup. : ${e.recovery}/10</span>
        <span>⚡ Énergie : ${e.energy}/10</span>
        <span>🏋️ Motiv. : ${e.motivation}/10</span>
        <span>😓 Stress : ${e.stress}/10</span>
        <span>😊 Humeur : ${e.mood}/10</span>
        <span>💧 ${e.hydration||"–"}</span>
        <span>🌡️ Fatigue : ${e.fatigue}/10</span>
        <span>🥗 ${e.nutrition_quality||"–"}</span>
        <span>🍽️ ${e.meals||"–"}</span>
        <span>🎯 Objectif : ${e.nutrition_objective||"–"}</span>
        <span>🏃 ${e.sport_type||"–"}${e.sport_quality?" · ${"★".repeat(e.sport_quality)}":""}</span>
      </div>
      <div class="brow">
        <span class="bdg bdg-b">Douleur : ${e.pain||"–"}</span>
        ${e.pain_zones&&e.pain_zones!=="Aucune"?`<span class="bdg bdg-r">Zones : ${e.pain_zones}</span>`:""}
      </div>
      ${e.notes?`<div class="coach-note-box" style="margin-top:.5rem">"${e.notes}"</div>`:""}
    </div>`;
  }).join("");

  return filterHtml + (cards||`<div class="empty">Aucun check-in.</div>`);
}

function buildAthletes(existingNames){
  const athletes_html = allAthletes.length===0
    ? `<div class="empty" style="padding:1rem">Aucun élève. Ajoute le premier ci-dessous.</div>`
    : allAthletes.map(a=>{
        const url = `${APP_URL}?athlete=${encodeURIComponent(a.name)}`;
        const cnt = allEntries.filter(e=>e.athlete_name===a.name).length;
        const last = allEntries.find(e=>e.athlete_name===a.name);
        const lastStr = last
          ? new Date(last.created_at).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})
          : "jamais";
        const ini = a.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
        return `<div>
          <div class="athl-item">
            <div class="athl-info">
              <div class="avatar">${ini}</div>
              <div>
                <div style="font-size:14px;font-weight:600;color:var(--text)">${a.name}</div>
                <div class="athl-meta">${cnt} check-in${cnt>1?"s":""} · dernier : ${lastStr}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center">
              <button class="btn-sm" onclick="copyAndShowLink('${a.name}','${url}')">Copier le lien</button>
              <button class="del-btn" onclick="deleteAthlete('${a.id}','${a.name}')">✕</button>
            </div>
          </div>
          <div class="link-box" id="lnk-${a.id}" style="display:none">${url}</div>
        </div>`;
      }).join("");

  return `
    <div class="card">
      <div class="sec-lbl">Ajouter un élève</div>
      <input type="text" id="new-name" placeholder="Prénom de l'élève (ex: Olivier)"
        maxlength="40" style="margin-bottom:.6rem"
        onkeydown="if(event.key==='Enter')addAthlete()"/>
      <button class="btn btn-primary" style="padding:10px;font-size:13px" onclick="addAthlete()">
        Ajouter et générer le lien
      </button>
    </div>
    <div class="card">
      <div class="sec-lbl">Élèves enregistrés — liens WhatsApp</div>
      ${athletes_html}
    </div>`;
}

function copyAndShowLink(name, url){
  const el = document.querySelectorAll(`[id^="lnk-"]`);
  const msg = `Bonjour ${name} ! 👋\n\nVoici ton lien personnalisé pour ton check-in quotidien :\n\n${url}\n\nPrend 2 minutes chaque jour pour me tenir informé de comment tu vas. À très vite !`;

  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>alert("✓ Message WhatsApp copié pour "+name+" !\n\nColle-le directement dans ta conversation."));
  } else {
    // Fallback
    document.querySelectorAll("[id^='lnk-']").forEach(e=>e.style.display="none");
    const lnkEl = document.querySelector(`[id^="lnk-"]`);
    if(lnkEl) lnkEl.style.display="";
    alert("Copie ce lien pour "+name+" :\n\n"+url);
  }
}

async function addAthlete(){
  const name = (document.getElementById("new-name")?.value||"").trim();
  if(!name){ alert("Saisis un prénom."); return; }

  const {error} = await db.from("athletes").insert([{name}]);
  if(error){ alert("Erreur : "+error.message); return; }

  document.getElementById("new-name").value="";
  await loadAndRenderCoach();
}

async function deleteAthlete(id, name){
  if(!confirm(`Supprimer ${name} de la liste des élèves ?\n(Les check-ins existants sont conservés.)`)) return;
  const {error} = await db.from("athletes").delete().eq("id",id);
  if(error){ alert("Erreur : "+error.message); return; }
  await loadAndRenderCoach();
}

// ── Init ──────────────────────────────────────────────────────
renderAthlete();
renderCoachLogin();
</script>
